name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -v

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend
        run: uvicorn app.main:app --port 18000 &
        working-directory: backend

      - name: Wait for backend ready
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:18000/api/v1/health > /dev/null 2>&1; do sleep 1; done'

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend image to ACR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az acr build \
              --registry ${{ vars.ACR_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image backend:${{ github.sha }} \
              --image backend:latest \
              --file backend/Dockerfile \
              backend/

      - name: Build and push frontend image to ACR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az acr build \
              --registry ${{ vars.ACR_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image frontend:${{ github.sha }} \
              --image frontend:latest \
              --file frontend/Dockerfile \
              frontend/

      - name: Deploy backend to Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name skill-studio-backend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

      - name: Deploy frontend to Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            BACKEND_FQDN=$(az containerapp show \
              --name skill-studio-backend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --query 'properties.configuration.ingress.fqdn' -o tsv)
            az containerapp update \
              --name skill-studio-frontend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} \
              --set-env-vars "BACKEND_URL=https://${BACKEND_FQDN}"
