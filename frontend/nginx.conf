server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend.
    # NOTE: When proxy_pass has a URI component (e.g. a trailing slash or an
    # explicit path), Nginx replaces the matching location prefix with that URI.
    # Using ${BACKEND_URL}/api/ here means the location prefix /api/ is
    # replaced by /api/, so the full path is preserved:
    #   /api/v1/skills  ->  ${BACKEND_URL}/api/v1/skills  (correct)
    # Without an explicit path, a BACKEND_URL that ends with "/" would cause
    # Nginx to strip the /api/ prefix and forward only /v1/skills (wrong).
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check forwarded to the backend's /health endpoint.
    # Explicit path avoids any ambiguity from the BACKEND_URL value.
    location /health {
        proxy_pass ${BACKEND_URL}/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
