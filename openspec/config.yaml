project:
  name: agentic-ragflow-studio
  description: >
    An AI Agent-driven studio for building data ingestion pipelines,
    with pluggable CLI agents (Claude Code, Codex, Copilot), customizable skills,
    visual pipeline construction, and rapid testing/debugging capabilities.
  version: 0.1.0

tech_stack:
  backend: Python FastAPI
  frontend: React + Ant Design + Vite
  database: SQLite (async via aiosqlite, SQLAlchemy 2.0)
  auth: none  # MVP single-user mode

specs:
  # Backend modules
  - skills/spec.md
  - connections/spec.md
  - pipelines/spec.md
  - pipeline-orchestration/spec.md
  - datasources/spec.md
  - runs/spec.md
  - targets/spec.md
  - agents/spec.md
  - executable-builtin-skills/spec.md
  - system/spec.md
  # Frontend UI
  - skill-library-ui/spec.md
  - skill-editor-ui/spec.md
  - pipeline-editor-ui/spec.md
  - editor-accordion-layout/spec.md
  - unified-table-ui/spec.md
  - page-header-component/spec.md
  - list-toolbar-component/spec.md
  - theme-system/spec.md
  # Testing
  - e2e-testing/spec.md

decisions:
  target_users: business developers
  skill_model: Azure AI Skillset compatible
  custom_skill_types:
    - web_api
    - config_template
    - python_code
  skill_discovery: marketplace/library + pipeline templates
  datasources: 16 种类型（参见 datasources/spec.md）
  output_targets:
    - azure_ai_search
    - azure_blob
    - cosmosdb_gremlin
    - neo4j
    - mysql
    - postgresql
  execution_modes:
    - sync   # small files
    - async  # large batches
  observability: per-step input/output + logs
  intermediate_results: retain with view/delete/scheduled cleanup
